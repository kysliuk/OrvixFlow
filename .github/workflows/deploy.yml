name: Deploy to Production [CONFIGURE BEFORE USE]

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Build, Push & Deploy
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: OrvixFlow.Api/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/orvixflow-api:latest
            ghcr.io/${{ github.repository }}/orvixflow-api:${{ github.sha }}

      - name: Build and push Web image
        uses: docker/build-push-action@v5
        with:
          context: orvixflow-web
          file: orvixflow-web/Dockerfile
          build-args: |
            NEXT_PUBLIC_API_URL=http://localhost:8080
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/orvixflow-web:latest
            ghcr.io/${{ github.repository }}/orvixflow-web:${{ github.sha }}

      - name: Deploy to production server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_SSH_HOST }}
          username: ${{ secrets.PROD_SSH_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            cd /opt/orvixflow
            # In production, pull the new images
            # docker compose -f docker-compose.prod.yml pull
            # docker compose -f docker-compose.prod.yml up -d --remove-orphans
            # docker system prune -f
            echo "Production target must be configured in secrets (PROD_SSH_HOST, PROD_SSH_USER, PROD_SSH_KEY) and opt directory setup."
            echo "Successfully pulled and deployed!"
