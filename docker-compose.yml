version: '3.8'

services:
  orvix-db:
    image: ankane/pgvector:latest
    container_name: orvix_postgres
    environment:
      POSTGRES_USER: orvix_admin
      POSTGRES_PASSWORD: orvix_password_dev
      POSTGRES_DB: orvixflow
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  n8n:
    image: docker.n8n.io/n8nio/n8n
    container_name: orvix_n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=production
      - WEBHOOK_URL=http://localhost:5678/
      - GENERIC_TIMEZONE=UTC
    volumes:
      - n8n_data:/home/node/.n8n
    restart: unless-stopped
    depends_on:
      - orvix-db

volumes:
  pgdata:
  n8n_data:
