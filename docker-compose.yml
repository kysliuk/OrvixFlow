services:
  orvix-db:
    image: ankane/pgvector:latest
    container_name: orvix_postgres
    environment:
      POSTGRES_USER: orvix_admin
      POSTGRES_PASSWORD: orvix_password_dev
      POSTGRES_DB: orvixflow
    ports:
      - 5432:5432
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - internal

  n8n:
    image: docker.n8n.io/n8nio/n8n
    container_name: orvix_n8n
    ports:
      - 5678:5678
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=production
      - WEBHOOK_URL=http://localhost:5678/
      - GENERIC_TIMEZONE=UTC
      - EXECUTIONS_MODE=internal
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY:-dev-encryption-key-change-me}
      # Optional: N8N basic auth - SHOULD BE SET in production
      # - N8N_BASIC_AUTH_ACTIVE=true
      # - N8N_BASIC_AUTH_USER=admin
      # - N8N_BASIC_AUTH_PASSWORD=${N8N_ADMIN_PASSWORD}
    volumes:
      - n8n_data:/home/node/.n8n
    restart: unless-stopped
    networks:
      - external
    # Explicitly do NOT depend on orvix-db - prevents automatic network attachment
    # n8n can ONLY reach orvix-api via the webhooks, not the database directly

  orvix-minio:
    image: minio/minio:latest
    container_name: orvix_minio
    command: server /data --console-address ":9001"
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:?MINIO_ACCESS_KEY is required}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:?MINIO_SECRET_KEY is required}
    volumes:
      - minio_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - internal

  clamav:
    image: clamav/clamav:stable_base
    container_name: orvix_clamav
    environment:
      - CLAMAV_NO_FRESHCLAMD=false
    volumes:
      - clamav_data:/var/lib/clamav
    restart: unless-stopped
    networks:
      - internal
    healthcheck:
      test: ["CMD", "clamdcheck.sh"]
      interval: 60s
      timeout: 10s
      retries: 5
      start_period: 120s

  orvix-api:
    build:
      context: .
      dockerfile: OrvixFlow.Api/Dockerfile
    container_name: orvix_api
    ports:
      - 8080:8080
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: Host=orvix-db;Database=orvixflow;Username=orvix_admin;Password=orvix_password_dev
      Frontend__BaseUrl: http://localhost:3000
      AutomationKey: ${AUTOMATION_KEY}
      Jwt__Secret: ${JWT_SECRET}
      Jwt__Issuer: ${JWT_ISSUER:-orvixflow}
      Jwt__Audience: ${JWT_AUDIENCE:-orvixflow-web}
      AI__Provider: OpenAI
      AI__OpenAI__ApiKey: ${AI_OPENAI_API_KEY}
      Automation__N8nBaseUrl: ${N8N_BASE_URL:-http://orvix-n8n:5678}
      Stripe__SecretKey: ${STRIPE_SECRET_KEY}
      Stripe__WebhookSecret: ${STRIPE_WEBHOOK_SECRET}
      Storage__Provider: ${STORAGE_PROVIDER:-MinIO}
      Storage__MinIO__Endpoint: http://orvix-minio:9000
      Storage__MinIO__Bucket: ${MINIO_BUCKET:-orvixflow}
      Storage__MinIO__UseSSL: "false"
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:?MINIO_ACCESS_KEY is required}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:?MINIO_SECRET_KEY is required}
      Security__VirusScan__Provider: ${VIRUS_SCAN_PROVIDER:-ClamAv}
      Security__VirusScan__ClamAv__Host: clamav
      Security__VirusScan__ClamAv__Port: 3310
    env_file:
      - .env
    depends_on:
      orvix-db:
        condition: service_started
      n8n:
        condition: service_started
      clamav:
        condition: service_healthy
      orvix-minio:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - uploads_data:/app/uploads
    networks:
      - internal
      - external # api needs to reach n8n for webhook callbacks

  orvix-web:
    build:
      context: ./orvixflow-web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8080
    container_name: orvix_web
    ports:
      - 3000:3000
    environment:
      NODE_ENV: production
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_TRUST_HOST: true
      NEXT_PUBLIC_API_URL: http://localhost:8080
      INTERNAL_API_URL: http://orvix-api:8080
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      AZURE_AD_CLIENT_ID: ${AZURE_AD_CLIENT_ID}
      AZURE_AD_CLIENT_SECRET: ${AZURE_AD_CLIENT_SECRET}
    env_file:
      - .env
    depends_on:
      - orvix-api
    restart: unless-stopped
    networks:
      - external

volumes:
  pgdata:
  n8n_data:
  uploads_data:
  minio_data:
  clamav_data:

networks:
  internal:
    driver: bridge
    name: orvixflow_internal
  external:
    driver: bridge
    name: orvixflow_external
